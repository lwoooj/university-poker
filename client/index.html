<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCI Poker League | Persistent Edition</title>
    <style>
        :root {
            --uci-blue: #0064a4;
            --uci-gold: #ffd200;
            --dark-bg: #0f0f0f;
            --card-white: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; } /* Crucial fix for layout shifting */

        body { 
            background: var(--dark-bg); 
            color: white; 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* Modern Login & Lobby */
        #auth-container, #lobby {
            margin-top: 80px;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        input {
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            border: 1px solid #333;
            margin-bottom: 20px;
            background: #1a1a1a;
            color: white;
            outline: none;
        }

        input:focus { border-color: var(--uci-blue); }

        button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }

        .btn-gold { background: var(--uci-gold); color: #000; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 210, 0, 0.3); }
        .btn-blue { background: var(--uci-blue); color: white; width: 100%; }

        .room-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            margin: 12px 0;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Game Table UI */
        #game { width: 100%; max-width: 1100px; padding: 20px; position: relative; }
        
        #table {
            background: radial-gradient(circle, #2e7d32 0%, #1b5e20 100%);
            width: 100%;
            height: 400px;
            margin: 60px auto;
            border-radius: 200px;
            border: 15px solid #3e2723;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 100px #000;
        }

        .card {
            background: white;
            color: black;
            width: 60px;
            height: 85px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin: 5px;
            font-size: 1.5rem;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.4);
            border: 1px solid #ddd;
        }

        #opponents {
            display: flex;
            gap: 20px;
            position: absolute;
            top: -70px;
            width: 100%;
            justify-content: center;
        }

        .opp-box {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 15px;
            border: 2px solid #333;
            min-width: 120px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .is-turn { border-color: var(--uci-gold); box-shadow: 0 0 20px rgba(255, 210, 0, 0.4); }

        /* FIXED BOTTOM BAR - Centered correctly now */
        #controls {
            background: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(15px);
            padding: 20px;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0; /* Ensures full-width centering */
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 25px;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        .btn-fold { background: #c62828; color: white; }
        .btn-action { background: #1565c0; color: white; min-width: 100px; }
        
        #my-area {
            text-align: center;
            margin-top: 20px;
            padding-bottom: 150px; /* Space for fixed bar */
        }
    </style>
</head>
<body>

    <div id="auth-container">
        <h1 style="color: var(--uci-gold); margin-bottom: 10px;">UCI POKER</h1>
        <p style="color: #888; margin-bottom: 30px;">Professional Network Login</p>
        <input type="text" id="username-input" placeholder="UCInetID (e.g. zotlink)">
        <button class="btn-gold" style="width: 100%" onclick="login()">Enter Arena</button>
    </div>

    <div id="lobby" class="hidden">
        <h2 style="margin-top:0">Welcome, <span id="user-display" style="color: var(--uci-gold);"></span></h2>
        <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; margin-bottom: 20px;">
            <span style="color: #aaa; font-size: 0.9rem;">Current Balance</span>
            <div style="font-size: 1.8rem; color: #4caf50; font-weight: bold;">$<span id="lobby-bal"></span></div>
        </div>
        <button class="btn-blue" onclick="socket.emit('create-room')">Open New Table</button>
        <div id="room-list" style="margin-top: 20px; text-align: left;"></div>
    </div>

    <div id="game" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0;">
            <div id="room-display" style="color: var(--uci-blue); font-weight: bold; letter-spacing: 1px;"></div>
            <button onclick="leaveGame()" style="background: rgba(255,255,255,0.1); color: white; padding: 5px 15px;">QUIT</button>
        </div>

        <div id="table">
            <div id="opponents"></div>
            <div style="text-align: center;">
                <div style="color: rgba(255,255,255,0.5); font-size: 0.8rem; text-transform: uppercase;">Current Pot</div>
                <h2 id="pot-ui" style="color: var(--uci-gold); font-size: 3rem; margin: 0;">$0</h2>
            </div>
            <div id="comm-ui" style="margin-top: 30px; min-height: 95px;"></div>
        </div>

        <div id="my-area">
            <div id="my-hand" style="margin-bottom: 15px;"></div>
            <div style="font-size: 1.2rem; font-weight: bold;">YOUR STACK: <span id="game-bal" style="color:#4caf50;">$0</span></div>
        </div>

        <div id="controls">
            <button class="btn-fold" onclick="act('fold')">FOLD</button>
            <button class="btn-action" id="check-btn" onclick="act('check')">CHECK</button>
            <button class="btn-action" id="call-btn" onclick="act('call')">CALL</button>
            
            <div style="display:flex; align-items:center; background: #333; padding: 5px 10px; border-radius: 8px; gap: 10px;">
                <input type="number" id="raise-amt" placeholder="Bet" style="margin:0; width:80px; background:transparent; border:none; padding:5px;">
                <button class="btn-gold" style="padding: 8px 15px;" onclick="raise()">RAISE</button>
            </div>

            <button id="host-start" class="btn-gold" style="display:none; border: 2px solid #000;" onclick="socket.emit('start-game')">
                START HAND ($100 ANTE)
            </button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myUsername = "";

        function login() {
            const val = document.getElementById('username-input').value;
            if(!val) return alert("Please enter a username");
            myUsername = val;
            socket.emit('login', val);
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('lobby').classList.remove('hidden');
            document.getElementById('user-display').innerText = val;
        }

        socket.on('lobby-list', (data) => {
            document.getElementById('lobby-bal').innerText = data.bankroll;
            const container = document.getElementById('room-list');
            container.innerHTML = data.list.length === 0 ? "<p style='text-align:center; color:#666;'>No tables available.</p>" : 
                data.list.map(r => `
                    <div class="room-card">
                        <span><b>${r.id}</b> <br><small style="color:#888">${r.count}/6 Players</small></span>
                        <button class="btn-gold" style="padding: 5px 15px;" onclick="socket.emit('join-room', '${r.id}')" 
                            ${r.count >= 6 || r.status !== 'waiting' ? 'disabled' : ''}>JOIN</button>
                    </div>
                `).join('');
        });

        function act(type) { socket.emit('action', { type }); }
        function raise() {
            const amt = document.getElementById('raise-amt').value;
            if(amt) { socket.emit('action', { type: 'raise', amount: amt }); document.getElementById('raise-amt').value = ''; }
        }
        function leaveGame() { if(confirm("Cashing out will save your chips to MongoDB. Leave?")) { socket.emit('leave-room'); } }

        socket.on('update', (room) => {
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
            document.getElementById('room-display').innerText = room.status === 'playing' ? "LIVE GAME" : "WAITING FOR PLAYERS";
            const me = room.players[socket.id];
            if(!me) return;
            document.getElementById('pot-ui').innerText = "$" + room.pot;
            document.getElementById('game-bal').innerText = "$" + me.chips;
            document.getElementById('comm-ui').innerHTML = room.community.map(c => renderCard(c)).join('');
            const oppContainer = document.getElementById('opponents');
            oppContainer.innerHTML = '';
            room.order.forEach(id => {
                if(id === socket.id) return;
                const p = room.players[id];
                const activeTurn = room.order[room.turn] === id;
                oppContainer.innerHTML += `
                    <div class="opp-box ${activeTurn ? 'is-turn' : ''}">
                        <div style="font-size:0.7rem; color:#888;">${p.username}</div>
                        <div style="font-weight:bold; color:#4caf50;">$${p.chips}</div>
                        <span class="decision-tag" style="color:var(--uci-gold); font-size:0.7rem;">${p.last || ''}</span>
                    </div>`;
            });
            const isMyTurn = room.order[room.turn] === socket.id;
            const callDiff = room.highBet - me.bet;
            document.getElementById('check-btn').style.display = callDiff === 0 ? "inline" : "none";
            document.getElementById('call-btn').style.display = callDiff === 0 ? "none" : "inline";
            document.getElementById('call-btn').innerText = `CALL $${callDiff}`;
            document.getElementById('host-start').style.display = (room.status === 'waiting' && room.order[0] === socket.id) ? "block" : "none";
            document.querySelectorAll('#controls button').forEach(btn => {
                if(btn.id !== 'host-start') btn.disabled = !isMyTurn || room.status !== 'playing';
            });
        });

        socket.on('receive-cards', (cards) => {
            document.getElementById('my-hand').innerHTML = cards.map(c => renderCard(c)).join('');
        });

        socket.on('back-to-lobby', (data) => {
            document.getElementById('game').classList.add('hidden');
            document.getElementById('lobby').classList.remove('hidden');
            document.getElementById('lobby-bal').innerText = data.bankroll;
        });

        socket.on('done', (d) => { alert(`Winner: ${d.win === socket.id ? "YOU" : "Opponent"}\nAmount: $${d.amount}\nReason: ${d.msg}`); });
        socket.on('error-msg', (msg) => alert(msg));

        function renderCard(c) {
            const isRed = (c.suit === '♥' || c.suit === '♦');
            const val = {11:'J', 12:'Q', 13:'K', 14:'A'}[c.value] || c.value;
            return `<div class="card" style="color: ${isRed ? '#d32f2f' : '#111'}">${val}${c.suit}</div>`;
        }
    </script>
</body>
</html>
