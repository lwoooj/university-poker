<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLDILUCKS</title>
    <style>
        :root { --uci-blue: #0064a4; --uci-gold: #ffd200; --dark-bg: #0f0f0f; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--dark-bg); color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .hidden { display: none !important; }

        #player-hud {
            position: fixed; top: 0; left: 0; width: 100%; height: 45px;
            background: rgba(0, 100, 164, 0.9); backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--uci-gold); z-index: 1000;
            display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center; padding: 0 20px;
        }
        .hud-left { justify-self: start; }
        .hud-center { justify-self: center; font-size: 1.2rem; font-weight: 900; }
        .hud-right { justify-self: end; }

        #auth-container { 
            margin-top: 120px; 
            padding: 40px; 
            background: rgba(255,255,255,0.05); 
            border-radius: 20px; 
            width: 380px; 
            text-align: center; 
            border: 1px solid #333; 
        }

        #lobby { 
            margin-top: 60px; 
            padding: 40px; 
            background: rgba(255,255,255,0.05); 
            border-radius: 20px; 
            width: 95%; 
            max-width: 1200px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 50px; 
            align-items: stretch;
        }

        #lobby-left-panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        input { padding: 12px; width: 100%; background: #1a1a1a; color: white; border: 1px solid #444; margin-bottom: 25px; border-radius: 5px; }
        button { padding: 10px 18px; cursor: pointer; font-weight: bold; border-radius: 6px; border: none; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-gold { background: var(--uci-gold); color: black; }
        .btn-blue { background: var(--uci-blue); color: white; width: 100%; }

        /* POKER TABLE */
        #game { width: 100%; max-width: 1000px; margin-top: 100px; text-align: center; }
        #table { 
            background: radial-gradient(circle, #2e7d32, #1b5e20); height: 380px; border-radius: 200px; border: 12px solid #3e2723; 
            position: relative; display: flex; align-items: center; justify-content: center; margin: 60px auto; box-shadow: 0 10px 50px rgba(0,0,0,0.5);
        }
        .card { background: white; color: black; width: 55px; height: 80px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; margin: 4px; font-weight: bold; font-size: 1.4rem; }
        #opponents { position: absolute; top: -85px; display: flex; gap: 12px; width: 100%; justify-content: center; z-index: 50; }
        .opp-box { background: #1a1a1a; padding: 10px; border-radius: 10px; border: 2px solid #333; min-width: 110px; }
        .is-turn { border-color: var(--uci-gold); box-shadow: 0 0 10px var(--uci-gold); }

        /* CENTERED CONTROLS */
        #controls { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; padding: 15px 0; display: flex; justify-content: center; align-items: center; gap: 12px; border-top: 1px solid #333; z-index: 900; }
        .raise-group { display: flex; align-items: center; background: #222; padding: 4px; border-radius: 8px; gap: 5px; }
        #raise-amt { width: 70px; border: none; padding: 8px; text-align: center; margin: 0; }

        #login-logo {
            width: 300px; 
            height: auto;
            margin-bottom: 20px;
            display: block;      
            margin-left: auto;
            margin-right: auto;
        }

        #team-chat-display {
            background: #050505 !important;
            border: 1px solid #111;
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            box-shadow: inset 0 0 10px #000;
        }

        #team-chat-display::-webkit-scrollbar {
            width: 4px;
        }
        #team-chat-display::-webkit-scrollbar-thumb {
            background: #00ff41;
        }

        .chat-log-entry {
            margin-bottom: 10px;
            border-left: 2px solid #333;
            padding-left: 10px;
            position: relative;
        }

        .chat-log-entry.is-me {
            border-left: 2px solid var(--uci-gold);
        }

        .chat-timestamp {
            color: #444;
            font-size: 0.65rem;
            margin-right: 8px;
        }

        .chat-sender {
            color: #00ff41;
            font-weight: bold;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .chat-text {
            color: #d1d1d1;
            font-size: 0.85rem;
            word-wrap: break-word;
            display: block;
            margin-top: 2px;
        }
    </style>

</head>
    <link rel="icon" type="image/png" href="logo2.png">

<body>

    <div id="player-hud" class="hidden">
        <div class="hud-left">
            <span style="color: var(--uci-gold); font-size: 0.7rem; display:block;">PLAYER</span>
            <span id="hud-username">---</span>
        </div>
        <div class="hud-center"><span id="hud-balance" style="color: #4caf50;">$0</span></div>
        <div class="hud-right">
            <span style="color: var(--uci-gold); font-size: 0.7rem; display:block; text-align:right;">PROFIT</span>
            <div id="hud-percent" style="font-size:0.9rem; font-weight:bold; text-align:right;">0%</div>
        </div>
    </div>

    <div id="auth-container">
        <img src="logo.png" alt="Goldilucks Logo" id="login-logo">
        <h2 style="color: var(--uci-gold); margin-bottom: 20px;"></h2>
        <input type="text" id="username-input" placeholder="Username">
        <button class="btn-gold" style="width:100%" onclick="login()">ENTER GAME</button>
    </div>

    <div id="team-menu" class="hidden" style="margin-top: 60px; width: 98%; max-width: 1400px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh;">
        
        <div id="team-guest-view" class="hidden" style="background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; width: 400px; border: 1px solid #333; display: flex; flex-direction: column; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <h2 style="color: var(--uci-gold); margin-bottom: 30px; text-align: center;">TEAM OPERATIONS</h2>
            
            <div style="display: flex; flex-direction: column; gap: 20px; width: 100%;">
                <button class="btn-gold" onclick="toggleJoinModal(true)" style="padding: 20px; font-size: 1rem;">JOIN A TEAM</button>
                <button class="btn-blue" onclick="toggleCreateModal(true)" style="padding: 20px; font-size: 1rem;">CREATE NEW TEAM</button>
            </div>

            <button onclick="showScreen('lobby')" style="margin-top: 30px; background: none; border: none; color: #666; cursor: pointer; text-decoration: underline;">Back to Lobby</button>
        </div>

        <div id="team-member-view" class="hidden" style="width: 100%; display: grid; grid-template-columns: 1.2fr 1fr 1.8fr; gap: 20px; align-items: stretch; height: 600px; margin-top: 20px;">
            
            <div style="display: flex; flex-direction: column; gap: 20px; height: 100%;">
                <div style="padding-left: 10px;">
                    <h2 id="team-title-ui" style="color: var(--uci-gold); font-size: 2rem; line-height: 1.1; margin-bottom: 5px;">---</h2>
                    <p id="team-code-ui" style="color: #666; font-size: 0.8rem; letter-spacing: 2px; font-weight: bold;">CODE: ---</p>
                </div>

                <div style="background: rgba(0,0,0,0.3); border-radius: 15px; padding: 20px; border: 1px solid #333; display: flex; flex-direction: column; flex-grow: 1; min-height: 0;">
                    <p style="color: var(--uci-gold); font-size: 0.7rem; letter-spacing: 1.5px; margin-bottom: 15px; opacity: 0.7;">TEAM RADIOGRAM</p>
                    <div id="team-chat-display" style="flex-grow: 1; overflow-y: auto; margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; padding-right: 5px;"></div>
                    <div style="display: flex; gap: 0; background: #000; border: 1px solid #333; padding: 5px;">
                        <span style="color: #00ff41; padding: 8px 0 8px 10px; font-family: monospace;">$</span>
                        <input type="text" id="team-chat-input" placeholder="execute_command..." 
                            style="margin-bottom: 0; padding: 8px; background: transparent; border: none; font-family: monospace; color: #00ff41; outline: none;"
                            onkeypress="if(event.key === 'Enter') sendTeamMsg()">
                        <button class="btn-blue" style="width: auto; padding: 0 15px; background: #111; color: #00ff41; border: 1px solid #333; font-family: monospace;" onclick="sendTeamMsg()">SEND</button>
                    </div>
                </div>
            </div>

            <div style="background: rgba(0,0,0,0.3); border-radius: 15px; padding: 25px; border: 1px solid #333; display: flex; flex-direction: column; height: 100%;">
                <p style="color: var(--uci-gold); font-size: 0.7rem; letter-spacing: 1.5px; margin-bottom: 20px; opacity: 0.7;">ACTIVE ROSTER</p>
                <div id="member-list-ui" style="display: flex; flex-direction: column; gap: 12px; overflow-y: auto;">
                </div>
                <div style="flex-grow: 1;"></div> 
                <button onclick="showScreen('lobby')" style="margin-top: 20px; background: none; border: none; color: #666; cursor: pointer; text-decoration: underline; font-size: 0.8rem;">Exit Team Hub</button>
            </div>

            <div style="background: rgba(0,0,0,0.3); border-radius: 15px; padding: 30px; border: 1px solid #333; display: flex; flex-direction: column; height: 100%;">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px;">
                    <div>
                        <p style="color: var(--uci-gold); font-size: 0.7rem; letter-spacing: 1.5px; opacity: 0.7;">PERFORMANCE INDEX</p>
                        <div id="team-vault-ui" style="font-size: 1.8rem; color: #4caf50; font-weight: 900; margin-top: 5px;">$0</div>
                    </div>
                    <div id="team-growth-ui" style="font-size: 1.2rem; font-weight: 900; padding-top: 15px;">0.0%</div>
                </div>
                <div style="flex-grow: 1; width: 100%; min-height: 0;">
                    <canvas id="teamPerformanceChart"></canvas>
                </div>
            </div>

        </div> </div>

    <div id="lobby" class="hidden">

        <div id="lobby-left-panel" style="display: flex; flex-direction: column; justify-content: space-between; height: 100%;">
    
            <div style="display: flex; flex-direction: column; gap: 20px;">
                
                <div>
                    <div style="margin-bottom: 10px;">
                        <h2 id="user-display" style="color: var(--uci-gold); font-size: 2.2rem; line-height: 1.2;"></h2>
                        <p style="color: #888; font-size: 0.8rem; letter-spacing: 2px;">ACCOUNT OVERVIEW</p>
                    </div>

                    <div style="background: rgba(0,0,0,0.2); padding: 25px; border-radius: 15px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <p style="color:#888; font-size:0.6rem; letter-spacing: 1px;">TOTAL BANKROLL</p>
                            <div style="font-size: 2.2rem; color: #4caf50; font-weight: 900;">$<span id="lobby-bal">0</span></div>
                        </div>
                        <div style="text-align: right;">
                            <p style="color:#888; font-size:0.6rem; letter-spacing: 1px;">TOTAL GROWTH</p>
                            <div id="lobby-percent" style="font-size: 1.8rem; font-weight: 900;">0.0%</div>
                        </div>
                    </div>
                </div>

                <button style="padding: 25px; font-size: 1.3rem; width: 100%; background: rgba(0,0,0,0.3); color: #888; font-weight: bold; border-radius: 8px; border: 1px solid #444; cursor: pointer; transition: all 0.3s ease;" 
                        onmouseover="this.style.color='var(--uci-gold)'; this.style.borderColor='var(--uci-gold)'; this.style.background='rgba(255,210,0,0.05)'" 
                        onmouseout="this.style.color='#888'; this.style.borderColor='#444'; this.style.background='rgba(0,0,0,0.3)'"
                        onclick="alert('Shop Coming Soon!')">
                    SHOP
                </button>

                <div style="display: flex; gap: 15px; width: 100%;">
                    <button style="flex: 1; padding: 25px; background: rgba(0,0,0,0.3); color: #888; border-radius: 8px; font-weight: bold; font-size: 1.3rem; border: 1px solid #444; cursor: pointer; transition: all 0.3s ease;" 
                        onmouseover="this.style.color='var(--uci-gold)'; this.style.borderColor='var(--uci-gold)'; this.style.background='rgba(255,210,0,0.05)'" 
                        onmouseout="this.style.color='#888'; this.style.borderColor='#444'; this.style.background='rgba(0,0,0,0.3)'"
                        onclick="showScreen('team-menu')"> TEAM
                    </button>
                    <button style="flex: 1; padding: 25px; background: rgba(0,0,0,0.3); color: #888; border-radius: 8px; font-weight: bold; font-size: 1.3rem; border: 1px solid #444; cursor: pointer; transition: all 0.3s ease;" 
                            onmouseover="this.style.color='var(--uci-gold)'; this.style.borderColor='var(--uci-gold)'; this.style.background='rgba(255,210,0,0.05)'" 
                            onmouseout="this.style.color='#888'; this.style.borderColor='#444'; this.style.background='rgba(0,0,0,0.3)'"
                            onclick="alert('Coming Soon!')">
                        RANKING
                    </button>
                </div>
            </div>

            <div style="margin-top: 30px;">
                <button class="btn-blue" 
                        style="padding: 25px; font-size: 1.3rem; width: 100%; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0, 100, 164, 0.2); background: #0064a4; color: white;" 
                        onmouseover="this.style.background='#0078c2'; this.style.boxShadow='0 6px 20px rgba(0, 100, 164, 0.4)'; this.style.transform='translateY(-2px)';" 
                        onmouseout="this.style.background='#0064a4'; this.style.boxShadow='0 4px 15px rgba(0, 100, 164, 0.2)'; this.style.transform='translateY(0px)';"
                        onclick="showScreen('table-browser')">
                    JOIN TABLE
                </button>
            </div>
        </div>

        <div id="lobby-right-panel" style="background: rgba(0,0,0,0.3); border-radius: 15px; padding: 30px; border: 1px solid #333; display: flex; flex-direction: column;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <p style="color: var(--uci-gold); font-size: 0.8rem; letter-spacing: 1.5px; margin: 0;">PERFORMANCE INDEX</p>
                
                <button onclick="resetGraph()" 
                        style="background: none; border: 1px solid #444; color: #666; font-size: 0.65rem; padding: 4px 10px; border-radius: 4px; cursor: pointer; transition: all 0.2s;" 
                        onmouseover="this.style.borderColor='var(--uci-gold)'; this.style.color='var(--uci-gold)'" 
                        onmouseout="this.style.borderColor='#444'; this.style.color='#666'">
                    RESET DATA
                </button>
            </div>

            <div style="flex-grow: 1; min-height: 450px; width: 100%;">
                <canvas id="performanceChart"></canvas>
            </div>
        </div>
    </div>

    <div id="table-browser" class="hidden" style="width: 600px; margin-top: 80px; padding: 40px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid #333;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px;">
            <h2 style="color: var(--uci-gold);">ACTIVE TABLES</h2>
            <button class="btn-gold" onclick="socket.emit('create-room')">+ CREATE NEW</button>
        </div>
        <div id="room-list" style="min-height: 200px;"></div>
        <button onclick="showScreen('lobby')" style="margin-top: 20px; background: none; color: #888; text-decoration: underline; border: none; cursor: pointer;">← Back to Dashboard</button>
    </div>

    <div id="game" class="hidden">
        <div id="table">
            <div id="opponents"></div>
            <div style="text-align: center;"><p style="color:rgba(255,255,255,0.4); font-size:0.8rem;">POT</p><h1 id="pot-ui" style="color: var(--uci-gold); font-size: 3rem; line-height:1;">$0</h1></div>
            <div id="comm-ui" style="position: absolute; bottom: 30px;"></div>
        </div>
        <div id="my-area" style="padding-bottom: 120px;"><div id="my-hand" style="margin-bottom: 10px;"></div></div>
        
        <div id="controls">
            <button class="btn-gold" id="host-start" style="display:none;" onclick="socket.emit('start-game')">START ($100)</button>
            <button id="fold-btn" onclick="act('fold')" style="background: #b71c1c; color: white;">FOLD</button>
            <button id="check-btn" onclick="act('check')" style="background: #1565c0; color: white;">CHECK</button>
            <button id="call-btn" onclick="act('call')" style="background: #1565c0; color: white;">CALL</button>
            <div class="raise-group"><input type="number" id="raise-amt" placeholder="Amt"><button id="raise-btn" class="btn-gold" onclick="raise()">RAISE</button></div>
            <button onclick="leaveGame()" style="background: #444; color: white;">QUIT</button>
        </div>
    </div>

    <div id="create-team-modal" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:2000; display:flex; align-items:center; justify-content:center;">
        <div style="background:#1a1a1a; padding:30px; border-radius:15px; border:2px solid var(--uci-gold); width:350px;">
            <h3 style="color:var(--uci-gold); margin-bottom:20px; text-align:center;">CREATE TEAM</h3>
            
            <input type="text" id="team-name-input" placeholder="Team Name">
            <textarea id="team-desc-input" placeholder="Short Description..." style="width:100%; background:#111; color:white; border:1px solid #444; padding:10px; border-radius:5px; height:80px; margin-bottom:20px; font-family:inherit;"></textarea>
            
            <div style="display:flex; gap:10px;">
                <button class="btn-gold" style="flex:1;" onclick="submitCreateTeam()">CREATE</button>
                <button style="flex:1; background:#444; color:white;" onclick="toggleCreateModal(false)">CANCEL</button>
            </div>
        </div>
    </div>

    <div id="join-team-modal" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:2000; display:flex; align-items:center; justify-content:center;">
        <div style="background:#1a1a1a; padding:30px; border-radius:15px; border:2px solid var(--uci-blue); width:450px; max-height: 80vh; display:flex; flex-direction:column;">
            <h3 style="color:var(--uci-blue); margin-bottom:20px; text-align:center;">FIND A TEAM</h3>
            
            <input type="text" id="team-search-input" placeholder="Search by name or code..." oninput="filterTeams(this.value)" style="margin-bottom:15px;">
            
            <div id="available-teams-list" style="overflow-y:auto; flex-grow:1; display:flex; flex-direction:column; gap:10px; margin-bottom:20px; padding-right:5px;">
                </div>
            
            <button style="width:100%; background:#444; color:white;" onclick="toggleJoinModal(false)">CANCEL</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let myTeamCode = null;
        let myUsername = "";
        let allTeams = [];
        let performanceChart;
        let teamPerformanceChart;
        let chipHistory = JSON.parse(localStorage.getItem('poker_history')) || [10000];
        const socket = io(window.location.origin);

        window.onload = () => {
            initChart();
        };

        socket.on('receive-team-message', (data) => {
            const display = document.getElementById('team-chat-display');
            if (!display) return;
            const isMe = data.sender === myUsername;

            const msgHtml = `
                    <div class="chat-log-entry ${isMe ? 'is-me' : ''}">
                        <div style="display: flex; align-items: center;">
                            <span class="chat-timestamp">[${data.time}]</span>
                            <span class="chat-sender" style="color: ${isMe ? 'var(--uci-gold)' : '#00ff41'}">
                                ${data.sender}>
                            </span>
                        </div>
                        <span class="chat-text">${data.text}</span>
                    </div>
            `;
            display.innerHTML += msgHtml;
            display.scrollTop = display.scrollHeight;
        });

        function showScreen(screenId) {
            const screens = ['auth-container', 'lobby', 'table-browser', 'game', 'team-menu'];
            
            screens.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.classList.add('hidden');
                    el.style.display = 'none';
                }
            });

            const target = document.getElementById(screenId);
            if (!target) return;

            target.classList.remove('hidden');

            if (screenId === 'team-menu') {
                    target.style.display = 'flex';
                    target.style.flexDirection = 'column';
                    target.style.alignItems = 'center';
                    target.style.justifyContent = 'center'; 
                    target.style.minHeight = 'calc(100vh - 100px)';
                    handleTeamViewLogic();
                } else if (screenId === 'lobby') {
                    target.style.display = 'grid';
                } else if (screenId === 'auth-container') {
                    target.style.display = 'flex';
                } else {
                    target.style.display = 'block';
                }

                const hud = document.getElementById('player-hud');
                if (hud) {
                    (screenId === 'game') ? hud.classList.remove('hidden') : hud.classList.add('hidden');
                }
            }

        function handleTeamViewLogic() {
            const guestView = document.getElementById('team-guest-view');
            const memberView = document.getElementById('team-member-view');

            if (!guestView || !memberView) return;

            if (myTeamCode) {
                guestView.classList.add('hidden');
                guestView.style.display = 'none';

                memberView.classList.remove('hidden');
                memberView.style.display = 'grid';
                
                socket.emit('join-team-chat', myTeamCode);
                socket.emit('request-team-details', myTeamCode);
                
                if (teamPerformanceChart) {
                    setTimeout(() => teamPerformanceChart.resize(), 0);
                }
            } else {
                memberView.classList.add('hidden');
                memberView.style.display = 'none';
                
                guestView.classList.remove('hidden');
                guestView.style.display = 'flex';
            }
        }

        function initChart() {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            const initialLabels = chipHistory.map((_, i) => i === 0 ? "Start" : `Game ${i}`);

            performanceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: initialLabels, 
                    datasets: [{
                        label: 'Bankroll',
                        data: chipHistory, 
                        borderColor: chipHistory[chipHistory.length - 1] >= 10000 ? '#4caf50' : '#f44336',
                        backgroundColor: 'transparent',
                        fill: false,
                        tension: 0,
                        pointRadius: 4,
                        pointHitRadius: 10,
                        borderWidth: 2,  
                        spanGaps: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: {
                        padding: { left: 5, right: 5 }
                    },
                    scales: {
                        x: { display: false,
                            boundaryGap: true,
                            grid: { offset: false }
                        },
                        y: { 
                            grid: { color: '#222' }, 
                            ticks: { color: '#888', font: { size: 10 } },
                            beginAtZero: false
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            displayColors: false, 
                            intersect: false,    
                            mode: 'index'
                        }
                    }
                }
            });
        }

        let teamChipHistory = [0]; 

        function initTeamChart() {
            const ctx = document.getElementById('teamPerformanceChart').getContext('2d');
            teamPerformanceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Start'],
                    datasets: [{
                        label: 'Club Value',
                        data: teamChipHistory,
                        borderColor: '#ffd200',
                        backgroundColor: 'transparent',
                        tension: 0,
                        borderWidth: 2,
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { display: false },
                        y: { grid: { color: '#222' }, ticks: { color: '#888' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function sendTeamMsg() {
            const input = document.getElementById('team-chat-input');
            const msg = input.value.trim();
            if (msg && myTeamCode) {
                socket.emit('send-team-message', { teamCode: myTeamCode, message: msg });
                input.value = '';
            }
        }

        function login() {
            const val = document.getElementById('username-input').value;
            if(!val) return;
            myUsername = val;
            socket.emit('login', val);
            
            showScreen('lobby');
            document.getElementById('user-display').innerText = "Welcome, " + val;
            
            if (!performanceChart) {
                initChart();
            }
        }

        function showTableSelection() {
            document.getElementById('table-selection').classList.toggle('hidden');
        }

        function act(type) { socket.emit('action', { type }); }
        
        function raise() { 
            const amt = document.getElementById('raise-amt').value; 
            if(amt) { 
                socket.emit('action', { type: 'raise', amount: Number(amt) }); 
                document.getElementById('raise-amt').value = ''; 
            } 
        }

        function leaveGame() { 
            if(confirm("Return to lobby?")) {
                socket.emit('leave-room');
                
                document.getElementById('my-hand').innerHTML = '';
                document.getElementById('comm-ui').innerHTML = '';
                document.getElementById('pot-ui').innerText = '$0';
            }
        }

        function resetGraph() {
            if (confirm("Reset graph history? (Your current balance will remain the same)")) {
                // Get the last known bankroll from the UI
                const currentVal = parseInt(document.getElementById('lobby-bal').innerText.replace(/,/g, '')) || 10000;
                
                // Reset local variables and storage
                chipHistory = [currentVal];
                localStorage.setItem('poker_history', JSON.stringify(chipHistory));
                
                // Refresh the chart visually
                if (performanceChart) {
                    performanceChart.data.labels = ['Start'];
                    performanceChart.data.datasets[0].data = chipHistory;
                    performanceChart.update();
                }
            }
        }

        function toggleCreateModal(show) {
            const modal = document.getElementById('create-team-modal');
            modal.style.display = show ? 'flex' : 'none';
            if (show) modal.classList.remove('hidden');
        }

        function toggleJoinModal(show) {
            const modal = document.getElementById('join-team-modal');
            modal.style.display = show ? 'flex' : 'none';
            if (show) {
                modal.classList.remove('hidden');
                socket.emit('request-all-teams'); 
            }
        }

        socket.on('all-teams-list', (teams) => {
            allTeams = teams;
            renderTeamList(teams);
        });

        function renderTeamList(teams) {
            const list = document.getElementById('available-teams-list');
            if (teams.length === 0) {
                list.innerHTML = `<p style="color:#666; text-align:center;">No teams found.</p>`;
                return;
            }

            list.innerHTML = teams.map(t => `
                <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:10px; border:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <div style="color:var(--uci-gold); font-weight:bold;">${t.name}</div>
                        <div style="font-size:0.7rem; color:#888;">${t.memberCount}/10 Members</div>
                    </div>
                    <button class="btn-gold" style="padding:5px 15px; font-size:0.8rem;" onclick="socket.emit('request-join-team', '${t.code}')">JOIN</button>
                </div>
            `).join('');
        }

        function filterTeams(query) {
            const filtered = allTeams.filter(t => 
                t.name.toLowerCase().includes(query.toLowerCase()) || 
                t.code.toLowerCase().includes(query.toLowerCase())
            );
            renderTeamList(filtered);
        }

        socket.on('team-joined', (data) => {
            alert(`Welcome to ${data.name}!`);
            toggleJoinModal(false);
            myTeamCode = data.code;
            showScreen('team-menu');
        });

        function submitCreateTeam() {
            const name = document.getElementById('team-name-input').value;
            const desc = document.getElementById('team-desc-input').value;

            if (!name || !desc) return alert("Please fill in all fields.");

            socket.emit('request-create-team', { name, desc });
        }

        // Listen for success/failure from server
        socket.on('team-created', (data) => {
            alert(`Success! Team ${data.name} created. Code: ${data.code}`);
            toggleCreateModal(false);
            showScreen('lobby');
        });

        socket.on('error-msg', (msg) => alert(msg));

        // ONE CLEAN LOBBY LISTENER
        socket.on('lobby-list', (data) => {
            myTeamCode = data.teamCode;
            const lobbyBalEl = document.getElementById('lobby-bal');
            if (lobbyBalEl) {
                lobbyBalEl.innerText = data.bankroll.toLocaleString();
            }
            
            // 2. ROI Percentage Calculation
            const lobbyPercent = document.getElementById('lobby-percent');
            if (lobbyPercent) {
                const baseline = 10000;
                const diff = data.bankroll - baseline;
                const percent = ((diff / baseline) * 100).toFixed(1);
                
                if (diff > 0) {
                    lobbyPercent.innerText = `+${percent}%`;
                    lobbyPercent.style.color = "#4caf50"; // Green
                } else if (diff < 0) {
                    lobbyPercent.innerText = `${percent}%`; // Shows the - sign automatically
                    lobbyPercent.style.color = "#f44336"; // Red
                } else {
                    lobbyPercent.innerText = "0.0%";
                    lobbyPercent.style.color = "#888"; // Gray
                }
            }

            // 3. Update Performance Graph (Chart.js)
            if (performanceChart) {
                if (data.bankroll !== chipHistory[chipHistory.length - 1]) {
                    chipHistory.push(data.bankroll);

                    if (chipHistory.length > 10) chipHistory.shift(); 

                    localStorage.setItem('poker_history', JSON.stringify(chipHistory));
                }

                performanceChart.data.labels = chipHistory.map((_, i) => i === 0 ? "Start" : `Game ${i}`);
                performanceChart.data.datasets[0].data = chipHistory;

                const lineColor = data.bankroll >= 10000 ? '#4caf50' : '#f44336';
                performanceChart.data.datasets[0].borderColor = lineColor;
            
                performanceChart.update();
            }


            // 4. Render Active Tables List
            const container = document.getElementById('room-list');
            if (container) {
                container.innerHTML = data.list.map(r => `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; background:rgba(255,255,255,0.03); margin-bottom:8px; border-radius:8px; border:1px solid #222;">
                        <span>
                            <b style="color:var(--uci-gold);">${r.id}</b> 
                            <small style="color:#888; margin-left:10px;">(${r.count}/6 Players)</small>
                        </span>
                        <button class="btn-gold" style="padding:5px 15px; font-size:0.8rem;" onclick="socket.emit('join-room', '${r.id}')">JOIN TABLE</button>
                    </div>`).join('') || "<p style='color:#555; text-align:center; padding:20px;'>No active tables. Create one to start the competition.</p>";
            }

            showScreen('lobby');
        });

        socket.on('team-details-response', (data) => {
            document.getElementById('team-title-ui').innerText = data.name;
            document.getElementById('team-code-ui').innerText = `TEAM CODE: ${data.code}`;
            
            const vaultEl = document.getElementById('team-vault-ui');
            const growthEl = document.getElementById('team-growth-ui');
            
            vaultEl.innerText = `$${data.totalBankroll.toLocaleString()}`;
            growthEl.innerText = `${data.growth > 0 ? '+' : ''}${data.growth}%`;
            growthEl.style.color = data.growth >= 0 ? "#4caf50" : "#f44336";

            // Handle Member List
            const list = document.getElementById('member-list-ui');
            list.innerHTML = data.members.map(m => `
                <div style="padding:12px; background:rgba(255,255,255,0.03); border-radius:8px; border:1px solid #222; font-size:0.9rem; display:flex; justify-content:space-between;">
                    <span>${m}</span>
                    <span style="color:#666; font-size:0.7rem;">MEMBER</span>
                </div>
            `).join('');

            // Handle Chart Initialization and Update
            if (!teamPerformanceChart) {
                initTeamChart();
            }
            
            // For now, we update the chart with the current total
            teamPerformanceChart.data.datasets[0].data.push(data.totalBankroll);
            if (teamPerformanceChart.data.datasets[0].data.length > 10) teamPerformanceChart.data.datasets[0].data.shift();
            teamPerformanceChart.data.labels = teamPerformanceChart.data.datasets[0].data.map((_, i) => i === 0 ? "Start" : `Update ${i}`);
            teamPerformanceChart.update();
        });

        socket.on('lobby-list-update', (data) => {
            const container = document.getElementById('room-list');
            if (container) {
                container.innerHTML = data.list.map(r => `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; background:rgba(255,255,255,0.03); margin-bottom:8px; border-radius:8px; border:1px solid #222;">
                        <span>
                            <b style="color:var(--uci-gold);">${r.id}</b> 
                            <small style="color:#888; margin-left:10px;">(${r.count}/6 Players)</small>
                        </span>
                        <button class="btn-gold" style="padding:5px 15px; font-size:0.8rem;" onclick="socket.emit('join-room', '${r.id}')">JOIN TABLE</button>
                    </div>`).join('') || "<p style='color:#555; text-align:center; padding:20px;'>No active tables. Create one to start the competition.</p>";
            }
        });

        socket.on('update', (room) => {
            // Hide Lobby, Show Game
            showScreen('game');
            
            const me = room.players[socket.id];
            if(!me) return;

            // HUD Sync
            document.getElementById('hud-username').innerText = me.username;
            document.getElementById('hud-balance').innerText = "$" + me.chips.toLocaleString();

            const percentEl = document.getElementById('hud-percent');
            const diff = me.chips - 10000;
            const percent = ((diff / 10000) * 100).toFixed(1);
            percentEl.innerText = (diff > 0 ? "+" : "") + percent + "%";
            percentEl.style.color = diff > 0 ? "#4caf50" : (diff < 0 ? "#f44336" : "#888");

            // Game UI
            document.getElementById('pot-ui').innerText = "$" + room.pot.toLocaleString();
            document.getElementById('comm-ui').innerHTML = room.community.map(c => renderCard(c)).join('');

            // Action Buttons
            const callAmount = room.highBet - me.bet;
            document.getElementById('call-btn').innerText = callAmount > 0 ? `CALL $${callAmount}` : `CALL`;

            // Opponent Rendering
            const opps = document.getElementById('opponents');
            opps.innerHTML = room.order.filter(id => id !== socket.id).map(id => {
                const p = room.players[id];
                const activeTurn = (room.status === 'playing' && room.order[room.turn] === id);
                return `
                    <div class="opp-box ${activeTurn ? 'is-turn' : ''}">
                        <div style="font-size:0.7rem; color:var(--uci-gold);">${p.username}</div>
                        <div style="font-weight:bold;">$${p.chips.toLocaleString()}</div>
                        <div style="font-size:0.6rem; color:#888;">${p.last || '-'}</div>
                    </div>`;
            }).join('');

            // Controls
            const isHost = room.order[0] === socket.id;
            const startBtn = document.getElementById('host-start');
            startBtn.style.display = (isHost && room.status === 'waiting') ? "block" : "none";
            startBtn.disabled = room.order.length < 2;

            const isMyTurn = (room.order[room.turn] === socket.id && room.status === 'playing');
            ['fold-btn', 'call-btn', 'raise-btn', 'check-btn'].forEach(id => {
                const el = document.getElementById(id);
                if(id === 'check-btn') el.disabled = !isMyTurn || callAmount > 0;
                else el.disabled = !isMyTurn;
            });
        });

        socket.on('back-to-lobby', () => { 
            showScreen('lobby');
            console.log("Returned to lobby by server.");
        });

        socket.on('receive-cards', (cards) => { 
            document.getElementById('my-hand').innerHTML = cards.map(c => renderCard(c)).join(''); 
        });

        socket.on('done', (d) => {
            alert(`Hand Over! Winner: ${d.win === socket.id ? "YOU" : "Opponent"} ($${d.amount})`);
        });

        function renderCard(c) {
            const isRed = (c.suit === '♥' || c.suit === '♦');
            const val = {11:'J', 12:'Q', 13:'K', 14:'A'}[c.value] || c.value;
            return `<div class="card" style="color: ${isRed ? '#d32f2f' : '#111'}">${val}${c.suit}</div>`;
        }
    </script>
</body>
</html>
