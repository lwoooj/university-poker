<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCI Poker League</title>
    <style>
        :root { --uci-blue: #0064a4; --uci-gold: #ffd200; --dark-bg: #0f0f0f; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--dark-bg); color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .hidden { display: none !important; }

        /* HUD BANNER */
        #player-hud {
            position: fixed; top: 0; left: 0; width: 100%; height: 45px;
            background: rgba(0, 100, 164, 0.9); backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--uci-gold); z-index: 1000;
            display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center; padding: 0 20px;
        }
        .hud-left { justify-self: start; }
        .hud-center { justify-self: center; font-size: 1.2rem; font-weight: 900; }
        .hud-right { justify-self: end; }

        /* CONTAINERS */
        /* LOGIN: Small and Centered */
        #auth-container { 
            margin-top: 120px; 
            padding: 40px; 
            background: rgba(255,255,255,0.05); 
            border-radius: 20px; 
            width: 380px; 
            text-align: center; 
            border: 1px solid #333; 
        }

        /* LOBBY: Large Full-Screen Dashboard */
        #lobby { 
            margin-top: 60px; 
            padding: 40px; 
            background: rgba(255,255,255,0.08); 
            border-radius: 20px; 
            width: 95%;           /* Stretches to fill screen */
            max-width: 1200px;    /* Caps it so it doesn't get TOO wide */
            min-height: 600px;    /* Gives it some vertical presence */
            text-align: left; 
            border: 1px solid #444; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 50px; 
            align-items: start;
        }

        input { padding: 12px; width: 100%; background: #1a1a1a; color: white; border: 1px solid #444; margin-bottom: 25px; border-radius: 5px; }
        button { padding: 10px 18px; cursor: pointer; font-weight: bold; border-radius: 6px; border: none; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-gold { background: var(--uci-gold); color: black; }
        .btn-blue { background: var(--uci-blue); color: white; width: 100%; }

        /* POKER TABLE */
        #game { width: 100%; max-width: 1000px; margin-top: 100px; text-align: center; }
        #table { 
            background: radial-gradient(circle, #2e7d32, #1b5e20); height: 380px; border-radius: 200px; border: 12px solid #3e2723; 
            position: relative; display: flex; align-items: center; justify-content: center; margin: 60px auto; box-shadow: 0 10px 50px rgba(0,0,0,0.5);
        }
        .card { background: white; color: black; width: 55px; height: 80px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; margin: 4px; font-weight: bold; font-size: 1.4rem; }
        #opponents { position: absolute; top: -85px; display: flex; gap: 12px; width: 100%; justify-content: center; z-index: 50; }
        .opp-box { background: #1a1a1a; padding: 10px; border-radius: 10px; border: 2px solid #333; min-width: 110px; }
        .is-turn { border-color: var(--uci-gold); box-shadow: 0 0 10px var(--uci-gold); }

        /* CENTERED CONTROLS */
        #controls { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; padding: 15px 0; display: flex; justify-content: center; align-items: center; gap: 12px; border-top: 1px solid #333; z-index: 900; }
        .raise-group { display: flex; align-items: center; background: #222; padding: 4px; border-radius: 8px; gap: 5px; }
        #raise-amt { width: 70px; border: none; padding: 8px; text-align: center; margin: 0; }
    </style>
</head>
<body>

    <div id="player-hud" class="hidden">
        <div class="hud-left">
            <span style="color: var(--uci-gold); font-size: 0.7rem; display:block;">PLAYER</span>
            <span id="hud-username">---</span>
        </div>
        <div class="hud-center"><span id="hud-balance" style="color: #4caf50;">$0</span></div>
        <div class="hud-right">
            <span style="color: var(--uci-gold); font-size: 0.7rem; display:block; text-align:right;">PROFIT</span>
            <div id="hud-percent" style="font-size:0.9rem; font-weight:bold; text-align:right;">0%</div>
        </div>
    </div>

    <div id="auth-container">
        <h2 style="color: var(--uci-gold); margin-bottom: 20px;">UCI POKER LEAGUE</h2>
        <input type="text" id="username-input" placeholder="UCInetID">
        <button class="btn-gold" style="width:100%" onclick="login()">ENTER ARENA</button>
    </div>

    <div id="lobby" class="hidden">
        <div id="lobby-left-panel">
            <div style="margin-bottom: 40px;">
                <h2 id="user-display" style="color: var(--uci-gold); font-size: 2.5rem;"></h2>
                <p style="color: #888; font-size: 0.9rem; letter-spacing: 2px;">ACCOUNT OVERVIEW</p>
            </div>
            <div style="background: rgba(0,0,0,0.2); padding: 30px; border-radius: 15px; border: 1px solid #333; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <p style="color:#888; font-size:0.7rem; letter-spacing: 1px;">TOTAL BANKROLL</p>
                    <div style="font-size: 2.5rem; color: #4caf50; font-weight: 900;">$<span id="lobby-bal">0</span></div>
                </div>
                <div style="text-align: right;">
                    <p style="color:#888; font-size:0.7rem; letter-spacing: 1px;">TOTAL GROWTH</p>
                    <div id="lobby-percent" style="font-size: 2rem; font-weight: 900;">0.0%</div>
                </div>
            </div>
            <button class="btn-blue" style="padding: 20px; font-size: 1.2rem; width: 100%;" onclick="showScreen('table-browser')">JOIN COMPETITION</button>
        </div>
        <div id="lobby-right-panel" style="background: rgba(0,0,0,0.3); border-radius: 15px; padding: 30px; border: 1px solid #333; height: 100%;">
            <p style="color: var(--uci-gold); font-size: 0.8rem; letter-spacing: 1.5px; margin-bottom: 20px;">PERFORMANCE INDEX</p>
            <div style="height: 450px; width: 100%;">
                <canvas id="performanceChart"></canvas>
            </div>
        </div>
    </div>

    <div id="table-browser" class="hidden" style="width: 600px; margin-top: 80px; padding: 40px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid #333;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px;">
            <h2 style="color: var(--uci-gold);">ACTIVE TABLES</h2>
            <button class="btn-gold" onclick="socket.emit('create-room')">+ CREATE NEW</button>
        </div>
        <div id="room-list" style="min-height: 200px;"></div>
        <button onclick="showScreen('lobby')" style="margin-top: 20px; background: none; color: #888; text-decoration: underline; border: none; cursor: pointer;">← Back to Dashboard</button>
    </div>

    <div id="game" class="hidden">
        <div id="table">
            <div id="opponents"></div>
            <div style="text-align: center;"><p style="color:rgba(255,255,255,0.4); font-size:0.8rem;">POT</p><h1 id="pot-ui" style="color: var(--uci-gold); font-size: 3rem; line-height:1;">$0</h1></div>
            <div id="comm-ui" style="position: absolute; bottom: 30px;"></div>
        </div>
        <div id="my-area" style="padding-bottom: 120px;"><div id="my-hand" style="margin-bottom: 10px;"></div></div>
        
        <div id="controls">
            <button class="btn-gold" id="host-start" style="display:none;" onclick="socket.emit('start-game')">START ($100)</button>
            <button id="fold-btn" onclick="act('fold')" style="background: #b71c1c; color: white;">FOLD</button>
            <button id="check-btn" onclick="act('check')" style="background: #1565c0; color: white;">CHECK</button>
            <button id="call-btn" onclick="act('call')" style="background: #1565c0; color: white;">CALL</button>
            <div class="raise-group"><input type="number" id="raise-amt" placeholder="Amt"><button id="raise-btn" class="btn-gold" onclick="raise()">RAISE</button></div>
            <button onclick="leaveGame()" style="background: #444; color: white;">QUIT</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Helper to switch between different main views
        function showScreen(screenId) {
            // List of all main container IDs
            const screens = ['auth-container', 'lobby', 'table-browser', 'game'];
            screens.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.add('hidden');
            });
            
            document.getElementById(screenId).classList.remove('hidden');

            // Logic: Only show HUD during the game
            const hud = document.getElementById('player-hud');
            if (screenId === 'game') {
                hud.classList.remove('hidden');
            } else {
                hud.classList.add('hidden');
            }
        }
        
        let performanceChart;
        let chipHistory = [10000]; // Starting baseline
        const socket = io(window.location.origin);
        let myUsername = "";

        function initChart() {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            performanceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Start'],
                    datasets: [{
                        label: 'Bankroll',
                        data: [10000],
                        borderColor: '#ffd200', // UCI Gold
                        backgroundColor: 'rgba(255, 210, 0, 0.1)',
                        fill: true,
                        tension: 0.4, // Smoothing
                        pointRadius: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { display: false },
                        y: { grid: { color: '#222' }, ticks: { color: '#888', font: { size: 10 } } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function login() {
            const val = document.getElementById('username-input').value;
            if(!val) return;
            myUsername = val;
            socket.emit('login', val);
            
            // NEW: Use the helper
            showScreen('lobby');
            
            document.getElementById('user-display').innerText = "Welcome, " + val;
            
            setTimeout(() => {
                if (!performanceChart) initChart();
            }, 200);
        }

        function showTableSelection() {
            document.getElementById('table-selection').classList.toggle('hidden');
        }

        function act(type) { socket.emit('action', { type }); }
        
        function raise() { 
            const amt = document.getElementById('raise-amt').value; 
            if(amt) { 
                socket.emit('action', { type: 'raise', amount: Number(amt) }); 
                document.getElementById('raise-amt').value = ''; 
            } 
        }

        function leaveGame() { 
            if(confirm("Return to lobby?")) {
                socket.emit('leave-room');
                
                showScreen('lobby');
                
                document.getElementById('my-hand').innerHTML = '';
                document.getElementById('comm-ui').innerHTML = '';
                document.getElementById('pot-ui').innerText = '$0';
            }
        }

        // ONE CLEAN LOBBY LISTENER
        socket.on('lobby-list', (data) => {
            // 1. Update Lobby Stats (Bankroll)
            const lobbyBalEl = document.getElementById('lobby-bal');
            if (lobbyBalEl) {
                lobbyBalEl.innerText = data.bankroll.toLocaleString();
            }
            
            // 2. ROI Percentage Calculation
            const lobbyPercent = document.getElementById('lobby-percent');
            if (lobbyPercent) {
                const baseline = 10000;
                const diff = data.bankroll - baseline;
                const percent = ((diff / baseline) * 100).toFixed(1);
                
                // Set text and color based on performance
                if (diff > 0) {
                    lobbyPercent.innerText = `+${percent}%`;
                    lobbyPercent.style.color = "#4caf50"; // Green
                } else if (diff < 0) {
                    lobbyPercent.innerText = `${percent}%`; // Shows the - sign automatically
                    lobbyPercent.style.color = "#f44336"; // Red
                } else {
                    lobbyPercent.innerText = "0.0%";
                    lobbyPercent.style.color = "#888"; // Gray
                }
            }

            // 3. Update Performance Graph (Chart.js)
            if (performanceChart) {
                // If it's our first time getting data, set the first point
                if (chipHistory.length === 1 && chipHistory[0] === 10000) {
                    chipHistory = [10000, data.bankroll]; 
                } else if (data.bankroll !== chipHistory[chipHistory.length - 1]) {
                    chipHistory.push(data.bankroll);
                }

                if (chipHistory.length > 20) chipHistory.shift(); 
                
                performanceChart.data.labels = chipHistory.map((_, i) => i === 0 ? "Start" : `H${i}`);
                performanceChart.data.datasets[0].data = chipHistory;
                
                const lineColor = data.bankroll >= 10000 ? '#4caf50' : '#f44336';
                performanceChart.data.datasets[0].borderColor = lineColor;
                performanceChart.update();
            }

            // 4. Render Active Tables List
            const container = document.getElementById('room-list');
            if (container) {
                container.innerHTML = data.list.map(r => `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; background:rgba(255,255,255,0.03); margin-bottom:8px; border-radius:8px; border:1px solid #222;">
                        <span>
                            <b style="color:var(--uci-gold);">${r.id}</b> 
                            <small style="color:#888; margin-left:10px;">(${r.count}/6 Players)</small>
                        </span>
                        <button class="btn-gold" style="padding:5px 15px; font-size:0.8rem;" onclick="socket.emit('join-room', '${r.id}')">JOIN TABLE</button>
                    </div>`).join('') || "<p style='color:#555; text-align:center; padding:20px;'>No active tables. Create one to start the competition.</p>";
            }
        });

        socket.on('update', (room) => {
            // Hide Lobby, Show Game
            showScreen('game');
            
            const me = room.players[socket.id];
            if(!me) return;

            // HUD Sync
            document.getElementById('hud-username').innerText = me.username;
            document.getElementById('hud-balance').innerText = "$" + me.chips.toLocaleString();

            const percentEl = document.getElementById('hud-percent');
            const diff = me.chips - 10000;
            const percent = ((diff / 10000) * 100).toFixed(1);
            percentEl.innerText = (diff > 0 ? "+" : "") + percent + "%";
            percentEl.style.color = diff > 0 ? "#4caf50" : (diff < 0 ? "#f44336" : "#888");

            // Game UI
            document.getElementById('pot-ui').innerText = "$" + room.pot.toLocaleString();
            document.getElementById('comm-ui').innerHTML = room.community.map(c => renderCard(c)).join('');

            // Action Buttons
            const callAmount = room.highBet - me.bet;
            document.getElementById('call-btn').innerText = callAmount > 0 ? `CALL $${callAmount}` : `CALL`;

            // Opponent Rendering
            const opps = document.getElementById('opponents');
            opps.innerHTML = room.order.filter(id => id !== socket.id).map(id => {
                const p = room.players[id];
                const activeTurn = (room.status === 'playing' && room.order[room.turn] === id);
                return `
                    <div class="opp-box ${activeTurn ? 'is-turn' : ''}">
                        <div style="font-size:0.7rem; color:var(--uci-gold);">${p.username}</div>
                        <div style="font-weight:bold;">$${p.chips.toLocaleString()}</div>
                        <div style="font-size:0.6rem; color:#888;">${p.last || '-'}</div>
                    </div>`;
            }).join('');

            // Controls
            const isHost = room.order[0] === socket.id;
            const startBtn = document.getElementById('host-start');
            startBtn.style.display = (isHost && room.status === 'waiting') ? "block" : "none";
            startBtn.disabled = room.order.length < 2;

            const isMyTurn = (room.order[room.turn] === socket.id && room.status === 'playing');
            ['fold-btn', 'call-btn', 'raise-btn', 'check-btn'].forEach(id => {
                const el = document.getElementById(id);
                if(id === 'check-btn') el.disabled = !isMyTurn || callAmount > 0;
                else el.disabled = !isMyTurn;
            });
        });

        socket.on('back-to-lobby', () => { 
            showScreen('lobby');
            console.log("Returned to lobby by server.");
        });

        socket.on('receive-cards', (cards) => { 
            document.getElementById('my-hand').innerHTML = cards.map(c => renderCard(c)).join(''); 
        });

        socket.on('done', (d) => {
            alert(`Hand Over! Winner: ${d.win === socket.id ? "YOU" : "Opponent"} ($${d.amount})`);
        });

        function renderCard(c) {
            const isRed = (c.suit === '♥' || c.suit === '♦');
            const val = {11:'J', 12:'Q', 13:'K', 14:'A'}[c.value] || c.value;
            return `<div class="card" style="color: ${isRed ? '#d32f2f' : '#111'}">${val}${c.suit}</div>`;
        }
    </script>
</body>
</html>
